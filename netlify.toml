[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self' https://formspree.io; script-src 'self' 'sha256-AF3TIgsNBDo/1gUvPN+kB0qbbYPe+Y549RPJEWc/OVQ=' 'sha256-xmAgwUdiD8BFzs3EzaBTnPt7LhJ9RSBpxUCLsaRBPR0='; style-src 'self'; img-src 'self' data: https://raisethebaragency.com; font-src 'self'; frame-src https://www.youtube-nocookie.com https://www.youtube.com; media-src 'self'; connect-src 'self' https://formspree.io; manifest-src 'self'; worker-src 'none'; upgrade-insecure-requests"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), ambient-light-sensor=(), autoplay=(self \"https://www.youtube-nocookie.com\"), battery=(), camera=(), clipboard-write=(), display-capture=(), document-domain=(), encrypted-media=(self \"https://www.youtube-nocookie.com\"), fullscreen=(self \"https://www.youtube-nocookie.com\"), geolocation=(), gyroscope=(), keyboard-map=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(self \"https://www.youtube-nocookie.com\"), publickey-credentials-get=(), screen-wake-lock=(), serial=(), usb=(), web-share=(), xr-spatial-tracking=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    X-Permitted-Cross-Domain-Policies = "none"
